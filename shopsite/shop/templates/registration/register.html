{% extends "shop/base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; background: white;">
    <h2>Регистрация нового игрока</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Зарегистрироваться</button>
    </form>
    <p style="margin-top: 15px; font-size: 0.9rem;">
        Уже есть аккаунт? <a href="{% url 'login' %}">Войти здесь</a>
    </p>
</div>
{% endblock %}

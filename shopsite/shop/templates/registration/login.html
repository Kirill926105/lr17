{% extends "shop/base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px;">
    <h2>Авторизация</h2>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label>Логин:</label><br>
            <input type="text" name="username" style="width: 100%; padding: 8px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Пароль:</label><br>
            <input type="password" name="password" style="width: 100%; padding: 8px;">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Войти</button>
    </form>
    <p style="margin-top: 15px; font-size: 0.9rem; color: #666;">
        Используй аккаунты (например, <b>gamer_1</b> / <b>pass12345</b>)
    </p>
</div>
{% endblock %}

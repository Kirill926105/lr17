{% extends "shop/base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px;">
    <h2>Авторизация</h2>
    <div id="login-error" class="alert alert-danger d-none"></div>
    <form method="post" action="{% url 'login' %}" id="login-form">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label>Логин:</label><br>
            <input type="text" name="username" id="login-username" class="form-control" required>
        </div>
        <div style="margin-bottom: 15px;">
            <label>Пароль:</label><br>
            <input type="password" name="password" id="login-password" class="form-control" required>
        </div>
        <input type="hidden" name="next" value="{% url 'account' %}">
        <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>
    <p style="margin-top: 15px; font-size: 0.9rem; color: #666;">
        Используй аккаунты (например, <b>seed_user1</b> / <b>12345</b>)
    </p>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('login-error').classList.add('d-none');

    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;

    try {
        // Получаем JWT токен для API-запросов
        const resp = await fetch('/api/token/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
        });

        if (resp.ok) {
            const data = await resp.json();
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
        }

        // Теперь отправляем форму на сервер для создания сессии Django
        e.target.submit();
    } catch {
        document.getElementById('login-error').textContent = 'Ошибка сети';
        document.getElementById('login-error').classList.remove('d-none');
    }
});
</script>
{% endblock %}

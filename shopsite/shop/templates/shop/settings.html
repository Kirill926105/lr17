{% extends "shop/base.html" %}

{% block title %}Настройки{% endblock %}

{% block content %}
<section class="settings-layout">
  <div class="section-heading">
    <div>
      <span class="eyebrow">Безопасность</span>
      <h1>Настройки аккаунта</h1>
    </div>
    <a class="btn btn-outline-primary" href="{% url 'account' %}">Назад в кабинет</a>
  </div>

  <div class="settings-card">
    <h2>Смена пароля</h2>
    <p class="text-muted">Используйте пароль от 6 символов. После смены текущая сессия останется активной.</p>
    <form id="password-form">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label" for="old-password">Текущий пароль</label>
        <input type="password" class="form-control" id="old-password" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="new-password">Новый пароль</label>
        <input type="password" class="form-control" id="new-password" required minlength="4">
      </div>
      <div class="mb-4">
        <label class="form-label" for="confirm-password">Подтвердите новый пароль</label>
        <input type="password" class="form-control" id="confirm-password" required>
      </div>
      <button type="submit" class="btn btn-success w-100">Сменить пароль</button>
    </form>
  </div>
</section>

<script>
function getCookie(name) {
  const value = `; ${document.cookie}`;
  const parts = value.split(`; ${name}=`);
  if (parts.length === 2) return parts.pop().split(';').shift();
}

function getToken() {
  return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
}

async function apiFetch(url, options = {}) {
  const token = getToken();
  const headers = options.headers || {};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  headers['Content-Type'] = 'application/json';
  const csrf = getCookie('csrftoken');
  if (csrf) headers['X-CSRFToken'] = csrf;
  return fetch(url, { ...options, headers, credentials: 'same-origin' });
}

document.getElementById('password-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const newPass = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;
  if (newPass !== confirmPass) {
    showToast('Пароли не совпадают.', 'danger');
    return;
  }

  try {
    const resp = await apiFetch('/api/me/change-password/', {
      method: 'POST',
      body: JSON.stringify({
        old_password: document.getElementById('old-password').value,
        new_password: newPass,
      }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      showToast(Object.values(err).flat().join('; '), 'danger');
      return;
    }
    localStorage.setItem('password_changed', 'true');
    window.location.href = "{% url 'account' %}";
  } catch {
    showToast('Ошибка сети. Попробуйте ещё раз.', 'danger');
  }
});
</script>
{% endblock %}

{% extends "shop/base.html" %}

{% block title %}Настройки{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Настройки</h2>

    <div class="card">
      <div class="card-header"><strong>Смена пароля</strong></div>
      <div class="card-body">
        <div id="settings-error" class="alert alert-danger d-none"></div>
        <div id="settings-success" class="alert alert-success d-none"></div>
        <form id="password-form">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Текущий пароль</label>
            <input type="password" class="form-control" id="old-password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Новый пароль</label>
            <input type="password" class="form-control" id="new-password" required minlength="4">
          </div>
          <div class="mb-3">
            <label class="form-label">Подтвердите новый пароль</label>
            <input type="password" class="form-control" id="confirm-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Сменить пароль</button>
        </form>
      </div>
    </div>

    <div class="mt-3">
      <a class="btn btn-outline-secondary" href="{% url 'account' %}">← Назад в личный кабинет</a>
    </div>
  </div>
</div>

<script>
function getCookie(name) {
  const value = `; ${document.cookie}`;
  const parts = value.split(`; ${name}=`);
  if (parts.length === 2) return parts.pop().split(';').shift();
}

function getToken() {
  return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
}

async function apiFetch(url, options = {}) {
  const token = getToken();
  const headers = options.headers || {};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  headers['Content-Type'] = 'application/json';
  const csrf = getCookie('csrftoken');
  if (csrf) headers['X-CSRFToken'] = csrf;
  return fetch(url, { ...options, headers, credentials: 'same-origin' });
}

document.getElementById('password-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('settings-error').classList.add('d-none');
  document.getElementById('settings-success').classList.add('d-none');

  const newPass = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;
  if (newPass !== confirmPass) {
    document.getElementById('settings-error').textContent = 'Пароли не совпадают';
    document.getElementById('settings-error').classList.remove('d-none');
    return;
  }

  try {
    const resp = await apiFetch('/api/me/change-password/', {
      method: 'POST',
      body: JSON.stringify({
        old_password: document.getElementById('old-password').value,
        new_password: newPass,
      }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      document.getElementById('settings-error').textContent = Object.values(err).flat().join('; ');
      document.getElementById('settings-error').classList.remove('d-none');
      return;
    }
    document.getElementById('settings-success').textContent = 'Пароль успешно изменён!';
    document.getElementById('settings-success').classList.remove('d-none');
    document.getElementById('password-form').reset();
  } catch {
    document.getElementById('settings-error').textContent = 'Ошибка сети';
    document.getElementById('settings-error').classList.remove('d-none');
  }
});
</script>
{% endblock %}
